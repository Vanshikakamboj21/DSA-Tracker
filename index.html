<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0"/>

  <title>DSA Revision Tracker</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

</head>

<body id="body"
class="bg-[#020817] text-white min-h-screen">

<!-- =========================
     NAVBAR
========================= -->

<nav id="navbar"
class="sticky top-0 z-50 bg-[#081225] border-b border-slate-800 px-6 py-4 flex justify-between items-center">

  <div class="flex items-center gap-3">

    <div class="bg-cyan-500 p-3 rounded-xl text-black">

      <i data-lucide="code-2"></i>

    </div>

    <h1 class="text-3xl font-bold">

      DSA Tracker

    </h1>

  </div>

  <div class="flex gap-3">

    <!-- THEME BUTTON -->

    <button id="themeBtn"
    class="bg-slate-800 p-3 rounded-xl hover:bg-slate-700">

      <i data-lucide="sun"></i>

    </button>

    <!-- LOG QUESTION -->

    <button onclick="openModal()"
    class="bg-cyan-500 hover:bg-cyan-400 text-black px-5 py-3 rounded-xl font-semibold flex items-center gap-2">

      <i data-lucide="plus"></i>

      Log Question

    </button>

  </div>

</nav>


<!-- =========================
     MAIN
========================= -->

<div class="max-w-7xl mx-auto p-6">

  <!-- DASHBOARD -->

  <div class="grid md:grid-cols-4 gap-5 mb-8">

    <div class="glass card rounded-2xl p-6">

      <p class="text-slate-400">
        Total Questions
      </p>

      <h2 id="totalQuestions"
      class="text-4xl font-bold mt-2">
        0
      </h2>

    </div>

    <div class="glass card rounded-2xl p-6">

      <p class="text-slate-400">
        Weak Questions
      </p>

      <h2 id="weakQuestions"
      class="text-4xl font-bold text-red-400 mt-2">
        0
      </h2>

    </div>

    <div class="glass card rounded-2xl p-6">

      <p class="text-slate-400">
        Strong Questions
      </p>

      <h2 id="strongQuestions"
      class="text-4xl font-bold text-green-400 mt-2">
        0
      </h2>

    </div>

    <div class="glass card rounded-2xl p-6">

      <p class="text-slate-400">
        Weakest Topic
      </p>

      <h2 id="weakestTag"
      class="text-3xl font-bold mt-2">
        -
      </h2>

    </div>

  </div>


  <!-- SEARCH -->

  <div class="glass card rounded-2xl p-5 mb-6">

    <div class="flex flex-col md:flex-row gap-4">

      <input
      id="searchInput"
      type="text"
      placeholder="Search Questions..."
      class="bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 w-full outline-none">

      <select id="platformFilter"
      class="bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3">

        <option value="">All Platforms</option>

        <option>LeetCode</option>

        <option>GFG</option>

        <option>Codeforces</option>

        <option>Other</option>

      </select>

    </div>

  </div>


  <!-- TABLE -->

  <div class="glass card rounded-2xl overflow-x-auto">

    <table class="w-full">

      <thead class="bg-[#111c35]">

        <tr>

          <th class="text-left p-4">
            Question
          </th>

          <th class="text-left p-4">
            Platform
          </th>

          <th class="text-left p-4">
            Tags
          </th>

          <th class="text-left p-4">
            Confidence
          </th>

          <th class="text-left p-4">
            Last Revised
          </th>

          <th class="text-left p-4">
            Next Revision
          </th>

          <th class="text-left p-4">
            Actions
          </th>

        </tr>

      </thead>

      <tbody id="questionTable">

      </tbody>

    </table>

  </div>

</div>


<!-- =========================
     ADD QUESTION MODAL
========================= -->

<div id="modal"
class="modal fixed inset-0 bg-black/70 items-center justify-center p-5">

  <div class="bg-[#081225] rounded-2xl p-6 w-full max-w-2xl">

    <!-- HEADER -->

    <div class="flex justify-between items-center mb-6">

      <h2 class="text-2xl font-bold">

        Add Question

      </h2>

      <button onclick="closeModal()"
      class="bg-red-500 px-3 py-1 rounded-lg">

        X

      </button>

    </div>


    <!-- FORM -->

    <div class="grid md:grid-cols-2 gap-4">

      <!-- QUESTION NAME -->

      <input
      id="questionName"
      type="text"
      placeholder="Question Name"
      class="inputBox">


      <!-- PLATFORM -->

      <select
      id="platform"
      class="inputBox">

        <option>LeetCode</option>

        <option>GFG</option>

        <option>Codeforces</option>

        <option>Other</option>

      </select>


      <!-- TAGS -->

      <input
      id="tags"
      type="text"
      placeholder="Tags (DP, Graph)"
      class="inputBox">


      <!-- TIME COMPLEXITY -->

      <input
      id="complexity"
      type="text"
      placeholder="Time Complexity"
      class="inputBox">


      <!-- CONFIDENCE -->

      <select
      id="confidence"
      class="inputBox">

        <option value="1">1</option>

        <option value="2">2</option>

        <option value="3">3</option>

        <option value="4">4</option>

        <option value="5">5</option>

      </select>


      <!-- DATE -->

      <input
      id="date"
      type="date"
      class="inputBox">

    </div>


    <!-- APPROACH -->

    <textarea
    id="approach"
    placeholder="Approach Used"
    class="inputBox w-full mt-4 h-24"></textarea>


    <!-- MISTAKES -->

    <textarea
    id="mistakes"
    placeholder="Mistake Notes"
    class="inputBox w-full mt-4 h-24"></textarea>


    <!-- SAVE BUTTON -->

    <button onclick="saveQuestion()"
    class="w-full bg-cyan-500 hover:bg-cyan-400 text-black py-3 rounded-xl font-semibold mt-5">

      Save Question

    </button>

  </div>

</div>


<!-- =========================
     NOTES MODAL
========================= -->

<div id="notesModal"
class="modal fixed inset-0 bg-black/70 items-center justify-center p-5">

  <div class="bg-[#081225] rounded-2xl p-6 w-full max-w-xl">

    <div class="flex justify-between items-center mb-5">

      <h2 class="text-2xl font-bold">

        Question Notes

      </h2>

      <button onclick="closeNotes()"
      class="bg-red-500 px-3 py-1 rounded-lg">

        X

      </button>

    </div>

    <div id="notesContent">

    </div>

  </div>

</div>


<!-- JS FILE -->

<script src="script.js"></script>

</body>

</html>
